 <!DOCTYPE html>
<html>

<head>
    <title>{{ guild.name }} Soundboard</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <!-- JS Stuff -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      $(document).ready(function(){
        $('.sidenav').sidenav();
        $('.modal').modal();
      });

      function play(val) {
        $.ajax({
          type: "POST",
          url: val,
          statusCode: {
            400: function (response) {
              alert(response.responseText);
            }
          }
        });
      }

      function uploadSound() {
        var form = document.getElementById("add-sound-form");
        var fileInput = document.getElementById("sound-file");
        if (fileInput.files.length === 0) {
          alert("Please choose an MP3 file to upload.");
          return;
        }

        var formData = new FormData();
        formData.append("name", document.getElementById("sound-name").value);
        formData.append(
          "description",
          document.getElementById("sound-description").value
        );
        formData.append("file", fileInput.files[0]);

        var button = document.getElementById("add-sound-submit");
        button.classList.add("disabled");

        $.ajax({
          type: "POST",
          url: form.action,
          data: formData,
          processData: false,
          contentType: false,
          success: function () {
            location.reload();
          },
          error: function (response) {
            button.classList.remove("disabled");
            alert(response.responseText || "Failed to upload the sound.");
          }
        });
      }
    </script>

    <style>
      @media only screen and (max-width: 600px) {
        .brand-logo {
          font-size: 24px !important;
          width: 300px;
          text-align: center;
        }
      }
      .btn {
        background-color: #ccff90;
        border-radius: 6px;
      }
      .btn:hover {
        background-color: #f1f8e9;
      }
      .btn:active {
        background-color: #558b2f;
      }
      .card .card-content {
        padding-top: 16px;
        padding-bottom: 16px;
        padding-left: 24px;
        padding-right: 24px;
      }
      .card .card-content .card-title {
        font-size: 19px;
        line-height: 28px;
        font-weight: 500;
      }
    </style>
</head>

<body class="blue-grey darken-4" style="padding-bottom: 24px;">

    {% include 'navbar.html' %}

  <div style="padding-left: 40px; padding-right: 40px;">
    <div>
      <h5 class="center-align blue-grey-text text-lighten-5">Play Sounds in {{ guild.name }}</h5>
    </div>
    <div style="display: grid; grid-gap: 24px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); align-items: stretch; margin-top: 24px;">
      {% for sound in sounds %}
      <div class="card blue-grey darken-2" style="margin: 0; display: flex; flex-direction: column;">
        <div class="card-content blue-grey-text text-lighten-4">
          <span class="card-title blue-grey-text text-lighten-4">
            <b>{{ sound.name }}</b>
          </span>
          <p>{{ sound.description }}</p>
        </div>
        <div class="card-action valign-wrapper" style="margin-top: auto;">
          <div onclick="play('{{ sound.url }}')" class="waves-effect waves-light btn">
            <i class="medium material-icons blue-grey-text text-darken-4">play_arrow</i>
          </div>
          <a href="{{ sound.youtube_link }}" target="_blank" class="light-green-text text-accent-1" style="margin-left: auto; margin-right: 0px">
            Watch on YouTube
          </a>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <!-- Floating button to open the add-sound modal -->
  <div class="fixed-action-btn">
    <a class="btn-floating btn-large modal-trigger" href="#add-sound-modal">
      <i class="large material-icons blue-grey-text text-darken-4">add</i>
    </a>
  </div>

  <!-- Add sound modal -->
  <div id="add-sound-modal" class="modal blue-grey darken-2">
    <div class="modal-content blue-grey-text text-lighten-4">
      <h5>Add a Sound to {{ guild.name }}</h5>
      <p class="blue-grey-text text-lighten-2" style="margin-bottom: 24px;">
        Upload an MP3 file (max 1 MB, up to 30 seconds).
      </p>
      <form
        id="add-sound-form"
        action="{{ url_for('sounds.sound_add', guild_id=guild_id) }}"
      >
        <div class="input-field">
          <input id="sound-name" type="text" maxlength="18" required
                 class="blue-grey-text text-lighten-4">
          <label for="sound-name">Name (max 18 characters)</label>
        </div>
        <div class="input-field">
          <input id="sound-description" type="text" maxlength="100" required
                 class="blue-grey-text text-lighten-4">
          <label for="sound-description">Description (max 100 characters)</label>
        </div>
        <div class="file-field input-field">
          <div class="btn blue-grey-text text-darken-4">
            <span>MP3</span>
            <input id="sound-file" type="file" accept=".mp3,audio/mpeg">
          </div>
          <div class="file-path-wrapper">
            <input class="file-path validate" type="text"
                   placeholder="Choose an MP3 file">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer blue-grey darken-2">
      <a href="#!" class="modal-close waves-effect btn-flat light-green-text text-accent-1">Cancel</a>
      <a id="add-sound-submit" class="waves-effect waves-light btn blue-grey-text text-darken-4" onclick="uploadSound()">
        Upload
      </a>
    </div>
  </div>
</body>

</html>
